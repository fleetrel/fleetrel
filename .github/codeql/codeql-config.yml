# .github/codeql/codeql-config.yml
name: "NX Monorepo CodeQL Config"

queries:
  - uses: security-extended
  # - uses: security-and-quality

paths:
  - apps/
  - packages/
  - libs/
  - tools/

paths-ignore:
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/.nx/**"
  - "**/coverage/**"
  - "**/generated/**"
  - "**/*.min.js"
  - "**/*.d.ts"
  - "**/jest.config.*"
  - "**/jest.setup.*"
  - "scripts/**"
  - "**/__mocks__/**"
  - "**/*.spec.ts"
  - "**/*.test.ts"
  - "**/*.e2e-spec.ts"
